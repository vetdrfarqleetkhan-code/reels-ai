name: Cloud smoke test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  streamlit-cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux packages
        run: sudo apt-get update && xargs -a packages.txt sudo apt-get install -y
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check
      - name: Import application
        run: python -m compileall -q app.py src
      - name: Start Streamlit and check health
        shell: bash
        run: |
          streamlit run app.py --server.address=127.0.0.1 --server.port=8501 --server.headless=true >streamlit.log 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8501/_stcore/health | grep -q ok; then
              exit 0
            fi
            sleep 1
          done
          cat streamlit.log
          exit 1
